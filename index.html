<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ForgeLab">
  <meta name="theme-color" content="#11100d">
  <meta name="description" content="A private iPhone-first tracker for lifting, body metrics, cardio, and 12-week cut progress.">
  <meta property="og:title" content="ForgeLab">
  <meta property="og:description" content="Private local-first training and cut tracker for iPhone.">
  <title>ForgeLab</title>
  <link rel="manifest" href="manifest.json?v=5">
  <link rel="apple-touch-icon" href="icons/icon-192.png?v=5">
  <link rel="stylesheet" href="styles.css?v=5">
</head>
<body>
  <a class="skipLink" href="#app">Skip to tracker</a>
  <div id="appShell">
    <header class="topbar">
      <div class="brandBlock">
        <img class="brandLogo" src="assets/forge-lab-logo.png" alt="ForgeLab - Train, Track, Refine">
        <h1 class="srOnly">ForgeLab</h1>
      </div>
      <button id="installHelpBtn" class="iconBtn" type="button" aria-label="Install help">
        <span aria-hidden="true">+</span>
        <span class="btnLabel">Install</span>
      </button>
    </header>

    <main id="app" class="app"></main>

    <nav class="bottomNav" aria-label="Primary navigation">
      <button data-view="today" class="navItem active" type="button"><span class="navIcon" aria-hidden="true">T</span><span>Today</span></button>
      <button data-view="plan" class="navItem" type="button"><span class="navIcon" aria-hidden="true">P</span><span>Plan</span></button>
      <button data-view="body" class="navItem" type="button"><span class="navIcon" aria-hidden="true">B</span><span>Body</span></button>
      <button data-view="cardio" class="navItem" type="button"><span class="navIcon" aria-hidden="true">C</span><span>Cardio</span></button>
      <button data-view="progress" class="navItem" type="button"><span class="navIcon" aria-hidden="true">G</span><span>Graph</span></button>
      <button data-view="settings" class="navItem" type="button"><span class="navIcon" aria-hidden="true">S</span><span>Setup</span></button>
    </nav>
  </div>

  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modalCard">
      <button id="closeModal" class="closeBtn" type="button" aria-label="Close">x</button>
      <h2 id="modalTitle">Add to iPhone Home Screen</h2>
      <p>Open this page in Safari, tap the Share icon, then choose <strong>Add to Home Screen</strong>. The app works offline after it has been opened once.</p>
      <p class="tiny">Your workout data is stored privately in this browser using local storage. Use Export in Settings to back it up.</p>
    </div>
  </div>

  <script src="app-data.js?v=5"></script>
  <script src="app.js?v=5"></script>
</body>
</html>
